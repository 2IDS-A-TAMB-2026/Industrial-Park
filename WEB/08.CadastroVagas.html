<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Cadastro de Vagas</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  background: linear-gradient(135deg, #0A0F1C, #0F1A35);
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background: rgba(18,28,58,0.9);
  backdrop-filter: blur(12px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo{
  font-size:20px;
  font-weight:600;
  color:#4CC9F0;
  margin-bottom:30px;
}

.menu a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  text-decoration:none;
  color:#B8C2D9;
  transition:0.3s;
}

.menu a:hover{
  background: rgba(76,201,240,0.2);
  color:#fff;
}

.menu a.active{
  background: rgba(76,201,240,0.3);
  color:#fff;
}

.user-footer{
  display:flex;
  align-items:center;
  gap:10px;
  color:#A9B4D0;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* CARD */
.card{
  background: rgba(18,28,58,0.6);
  backdrop-filter: blur(12px);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  color:#A9B4D0;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-group{
  margin-bottom:10px;
}

input, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#4CC9F0;
  color:#0A0F1C;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* STATUS */
.livre{ color:#4ade80; }
.ocupada{ color:#f87171; }
.indisponivel{ color:#facc15; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="logo">
      <i class="fa-solid fa-square-parking"></i> Industrial Park
    </div>

    <div class="menu">
      <a href="07.DashboardAdmin.html">
        <i class="fa-solid fa-house"></i> Dashboard
      </a>

      <a href="#" class="active">
        <i class="fa-solid fa-plus"></i> Cadastro de vagas
      </a>

      <a href="09.GerenciamentoSensoresIoT.html">
        <i class="fa-solid fa-microchip"></i> Sensores IoT
      </a>

      <a href="20.ConfirmaçãoLogout.html">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>
  </div>

  <div class="user-footer">
    <i class="fa-solid fa-circle-user"></i>
    <span>(Admin)</span>
  </div>

</div>

<!-- MAIN -->
<div class="main">
    <!-- FORM -->
  <div class="card">
    <h2>Cadastrar Vaga</h2>

    <form id="formVaga">

      <div class="form-group">
        <label>Código</label>
        <input type="text" id="codigo" placeholder="Ex: V01">
      </div>

      <div class="form-group">
        <label>Setor</label>
        <input type="text" id="setor" placeholder="Ex: A">
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="">Selecione</option>
          <option value="Livre">Livre</option>
          <option value="Ocupada">Ocupada</option>
          <option value="Indisponível">Indisponível</option>
        </select>
      </div>

      <div class="form-group">
        <label>Sensor</label>
        <select id="sensor">
          <option value="">Nenhum</option>
          <option value="S01">Sensor 1</option>
          <option value="S02">Sensor 2</option>
        </select>
      </div>

      <button type="submit">Cadastrar</button>

    </form>
  </div>

  <!-- TABELA -->
  <div class="card">
    <h2>Vagas Cadastradas</h2>

    <table id="tabelaVagas">
      <thead>
        <tr>
          <th>Código</th>
          <th>Setor</th>
          <th>Status</th>
          <th>Sensor</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>
  </div>

</div>

<script>
const form = document.getElementById("formVaga");
const tabela = document.querySelector("#tabelaVagas tbody");

let vagas = [];

form.addEventListener("submit", function(e){
  e.preventDefault();

  const codigo = document.getElementById("codigo").value;
  const setor = document.getElementById("setor").value;
  const status = document.getElementById("status").value;
  const sensor = document.getElementById("sensor").value || "Nenhum";

  if(!codigo || !setor || !status){
    alert("Preencha todos os campos obrigatórios!");
    return;
  }

  // evitar duplicado
  if(vagas.find(v => v.codigo === codigo)){
    alert("Vaga já cadastrada!");
    return;
  }

  vagas.push({codigo,setor,status,sensor});

  const tr = document.createElement("tr");

  let classe = status.toLowerCase();
  if(status === "Indisponível") classe = "indisponivel";

  tr.innerHTML = `
    <td>${codigo}</td>
    <td>${setor}</td>
    <td class="${classe}">${status}</td>
    <td>${sensor}</td>
  `;

  tabela.appendChild(tr);

  form.reset();
});
</script>

</body>
</html>
