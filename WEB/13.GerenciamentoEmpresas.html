<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Empresas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100%;
        }

        /* ===== FUNDO COM IMAGEM ===== */
        .background{
            position: fixed;
            inset: 0;
            background-image: url('images/estacionamento.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* ===== OVERLAY ESCURO ===== */
        .overlay{
            position: fixed;
            inset: 0;
            background: rgba(2, 23, 54, 0.85);
            z-index: 1;
        }

        /* ===== DESATIVA FUNDO ANTIGO ===== */
        .hero-bg-animation{
            display: none;
        }

        /* ===== CONTAINER ===== */
        .container{
            position: relative;
            z-index: 2;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            width: 520px;
            max-height: 90vh;
            overflow: auto;
            padding: 30px 40px;
            border-radius: 10px;
            color: white;
        }

        h2, h3{
            text-align:center;
            margin-bottom:15px;
        }

        /* ===== TABELA ===== */
        table{
            width:100%;
            border-collapse:collapse;
            margin-bottom:20px;
        }

        th, td{
            border:1px solid rgba(255,255,255,0.2);
            padding:8px;
            text-align:center;
            font-size:14px;
        }

        th{
            background:#12263a;
            color:white;
        }

        /* ===== INPUTS ===== */
        label{
            font-size:14px;
        }

        input, select{
            display:block;
            width:100%;
            padding:10px;
            border-radius:4px;
            border:none;
            margin-top:5px;
            margin-bottom:10px;
        }

        .erro{
            color:#ff4d4d;
            font-size:12px;
            display:block;
            margin-bottom:8px;
        }

        /* ===== BOTÕES ===== */
        button{
            width:100%;
            padding:12px;
            background: transparent;
            border:2px solid white;
            color:white;
            font-weight:bold;
            cursor:pointer;
            border-radius:4px;
            transition:0.3s;
            margin-top:5px;
        }

        button:hover{
            background:white;
            color:#003c96;
        }

        #btnCancelar{
            border:2px solid #ff4d4d;
            color:#ff4d4d;
        }

        #btnCancelar:hover{
            background:#ff4d4d;
            color:white;
        }

        @media(max-width: 600px){
            .container{
                width: 90%;
            }
        }
    </style>
</head>

<body>

<!-- NOVO FUNDO -->
<div class="background"></div>
<div class="overlay"></div>

<!-- FUNDO ANTIGO (DESATIVADO) -->
<div class="hero-bg-animation">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
</div>

<div class="container">

    <h2>Gerenciamento de Empresas</h2>

    <table id="tabelaEmpresas">
        <tr>
            <th>Nome</th>
            <th>CNPJ</th>
            <th>Endereço</th>
            <th>Status</th>
        </tr>
    </table>

    <h3>Cadastro de Empresa</h3>

    <label>Nome da Empresa</label>
    <input type="text" id="nomeEmpresa">
    <span id="erroNome" class="erro"></span>

    <label>CNPJ</label>
    <input type="text" id="cnpjEmpresa" placeholder="00.000.000/0000-00">
    <span id="erroCnpj" class="erro"></span>

    <label>Endereço</label>
    <input type="text" id="enderecoEmpresa">
    <span id="erroEndereco" class="erro"></span>

    <label>Status da Empresa *</label>
    <select id="statusEmpresa">
        <option value="">Selecione</option>
        <option>Ativa</option>
        <option>Inativa</option>
    </select>
    <span id="erroStatus" class="erro"></span>

    <button id="btnSalvar">Salvar</button>
    <button id="btnCancelar">Cancelar</button>

</div>

<script src="13.GerenciamentoEmpresas.js"></script>

</body>
</html>
