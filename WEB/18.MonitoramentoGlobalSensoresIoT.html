<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Dashboard admin</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
}

/* Menu lateral */
.sidebar {
  width: 220px;
  height: 100vh;
  background-color: #003366;
  padding-top: 20px;
  position: fixed;
}

.sidebar a {
  display: block;
  color: white;
  padding: 15px;
  text-decoration: none;
}

.sidebar a:hover {
  background-color: #022e5b;
}

/* Conteúdo principal */
.content {
  margin-left: 220px;
  padding: 20px;
  flex: 1;
}

h2 {
  color: #003366;
}

/* Estacionamento */

.info {
    margin: 15px 0;
    font-size: 16px;
}

.legenda {
    margin-bottom: 15px;
}

.legenda span {
    display: inline-block;
    margin-right: 15px;
}

.vaga {
    width: 30px;
    height: 30px;
    margin: 4px;
    border-radius: 5px;
    display: inline-block;
}

.livre {
    background-color: #22c55e;
}

.ocupada {
    background-color: #ef4444;
}

.estacionamento {
    display: inline-block;
    padding: 15px;
    background: #f4f6f9;
    border-radius: 8px;
}

.linha {
    display: flex;
}
</style>

<body>

<div class="sidebar">
    <a href="#">Nível de acesso: Administrador</a>
    <a href="#">cadastro de vagas</a>

    <a href="02.LoginUserComum.html">Logout</a>
    <br><br>
    <a href="#"><i class="fa-solid fa-circle-user"></i> (Admin Cadastrado)</a>
</div>

<div class="content">

    <h2>Painel de controle</h2>

    <div class="info">
        Livres: <strong>10</strong> 
        Ocupadas: <strong>6</strong>
    </div>


    <div class="estacionamento">

        <div class="linha">
            <div class="vaga livre"> A01</div>
            <div class="vaga ocupada">A02</div>
            <div class="vaga livre">A03</div>
            <div class="vaga livre">A04</div>
            <div class="vaga ocupada">A05</div>
            <div class="vaga livre">A06</div>
            <div class="vaga ocupada">A07</div>
            <div class="vaga livre">A08</div>
        </div>

        <div class="linha">
            <div class="vaga livre">A09</div>
            <div class="vaga livre">A10</div>
            <div class="vaga ocupada">A11</div>
            <div class="vaga livre">A12</div>
            <div class="vaga ocupada">A13</div>
            <div class="vaga livre">A14</div>
            <div class="vaga livre">A15</div>
            <div class="vaga ocupada">A16</div>
        </div>

    </div>

</div>

</body>
</html>
