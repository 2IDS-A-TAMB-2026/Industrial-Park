<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encerrar Sessão</title>

<!-- FONTE -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<!--Símbolo-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0A0F1C, #0F1A35);
  color:#fff;
}

/* CARD */
.container{
  background: rgba(18,28,58,0.6);
  backdrop-filter: blur(12px);
  padding:40px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.icone{
  font-size:60px;
  text-align:center;
  margin-bottom:15px;
}

/* TEXTO */
.container h2{
  font-size:18px;
  font-weight:500;
  margin-bottom:25px;
  color:#A9B4D0;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  margin-top:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  transition:0.3s;
  display:block;
  text-decoration:none;
  text-align:center;
}

/* SAIR */
.sair{
  background: linear-gradient(135deg,#f87171,#ef4444);
  color:#fff;
}

.sair:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(248,113,113,0.4);
}

/* CANCELAR */
.cancelar{
  background: linear-gradient(135deg,#4CC9F0,#3AB0D6);
  color:#0A0F1C;
}

.cancelar:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(76,201,240,0.4);
}
</style>
</head>

<body>

<div class="container">
  <div class="icone">
  <i class="fa-solid fa-right-from-bracket"></i>
</div>

<p class="mensagem">
  Você está saindo...<br>
  Tem certeza que deseja sair?
</p>
  <a href="02.LoginUserComum.html" class="btn sair">
    Encerrar sessão
  </a>

  <a href="04.DashBoardUser.html" class="btn cancelar">
    Cancelar
  </a>
</div>

</body>
</html>
