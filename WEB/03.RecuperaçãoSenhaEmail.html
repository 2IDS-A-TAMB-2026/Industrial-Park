<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperação de Senha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100%;
        }

        /* ===== FUNDO COM IMAGEM ===== */
        .background{
            position: fixed;
            inset: 0;
            background-image: url('images/estacionamento.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* ===== OVERLAY ESCURO ===== */
        .overlay{
            position: fixed;
            inset: 0;
            background: rgba(2, 23, 54, 0.85);
            z-index: 1;
        }

        /* ===== REMOVE FUNDO ANTIGO ===== */
        .hero-bg-animation{
            display: none;
        }

        /* ===== CONTAINER ===== */
        .container{
            position: relative;
            z-index: 2;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            padding: 30px 40px;
            border-radius: 10px;
            color: white;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            font-size: 26px;
        }

        label{
            font-size:14px;
        }

        input{
            display:block;
            padding:10px;
            width:100%;
            border-radius:4px;
            border:none;
            margin-top:5px;
            margin-bottom:10px;
        }

        .erro{
            color:#ff4d4d;
            font-size:12px;
            display:block;
            margin-bottom:8px;
        }

        button{
            width:100%;
            padding:12px;
            background: transparent;
            border:2px solid white;
            color:white;
            font-weight:bold;
            cursor:pointer;
            border-radius:4px;
            transition:0.3s;
        }

        button:hover{
            background:white;
            color:#003c96;
        }

        a{
            font-size:13px;
            text-decoration:none;
            color:white;
            opacity:0.8;
        }

        a:hover{
            text-decoration:underline;
            opacity:1;
        }

        @media(max-width: 500px){
            .container{
                width: 90%;
            }
        }
    </style>
</head>

<body>

<!-- NOVO FUNDO -->
<div class="background"></div>
<div class="overlay"></div>

<!-- FUNDO ANTIGO (DESATIVADO PELO CSS) -->
<div class="hero-bg-animation">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
</div>

<div class="container">

    <h2>Recuperação de Senha</h2>

    <form id="formRecuperar">

        <label>E-mail Cadastrado</label>
        <input type="email" 
               id="email" 
               placeholder="Digite seu e-mail cadastrado">

        <span id="erroEmail" class="erro"></span>

        <button type="submit">Enviar Solicitação</button>

    </form>

    <br><br>
    <a href="02.LoginUserComum.html">Voltar para Login</a>

</div>

<script src="03.RecuperaçãoSenhaEmail.js"></script>

</body>
</html>
