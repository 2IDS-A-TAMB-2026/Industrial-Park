<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Administrador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100%;
        }

        /* ===== FUNDO COM IMAGEM ===== */
        .background{
            position: fixed;
            inset: 0;
            background-image: url('images/estacionamento.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* ===== OVERLAY ESCURO ===== */
        .overlay{
            position: fixed;
            inset: 0;
            background: rgba(2, 23, 54, 0.85);
            z-index: 1;
        }

        /* ===== CONTAINER ===== */
        .container{
            position: relative;
            z-index: 2;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            width: 340px;
            max-height: 90vh;
            overflow: auto;
            padding: 30px 40px;
            border-radius: 10px;
            color: white;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            font-size: 28px;
        }

        label{
            font-size:14px;
        }

        input, select{
            display:block;
            padding:10px;
            width:100%;
            border-radius:4px;
            border:none;
            margin-top:5px;
            margin-bottom:10px;
        }

        .erro{
            color:#ff4d4d;
            font-size:12px;
            display:block;
            margin-bottom:8px;
        }

        .bordaVermelha{
            border:2px solid red !important;
        }

        .bordaVerde{
            border:2px solid limegreen !important;
        }

        button{
            width:100%;
            padding:12px;
            background: transparent;
            border:2px solid white;
            color:white;
            font-weight:bold;
            cursor:pointer;
            border-radius:4px;
            transition:0.3s;
        }

        button:hover{
            background:white;
            color:#003c96;
        }

        @media(max-width: 500px){
            .container{
                width: 90%;
            }
        }
    </style>
</head>

<body>

<!-- FUNDO -->
<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <h2>Cadastro de Administrador</h2>

    <form id="formCadastro">

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite o nome completo do administrador">
        <span id="erroNome" class="erro"></span>

        <label>CPF</label>
        <input type="text" id="cpf">
        <span id="erroCpf" class="erro"></span>

        <label>E-mail Corporativo</label>
        <input type="email" id="email">
        <span id="erroEmail" class="erro"></span>

        <label>Empresa Vinculada</label>
        <select id="empresa">
            <option value="">Selecione a empresa</option>
            <option value="A">Empresa A</option>
            <option value="B">Empresa B</option>
        </select>
        <span id="erroEmpresa" class="erro"></span>

        <label>Senha</label>
        <input type="password" id="senha">
        <span id="erroSenha" class="erro"></span>

        <label>Confirmação de Senha</label>
        <input type="password" id="confirmarSenha">
        <span id="erroConfirmarsenha" class="erro"></span>

        <button type="submit">Cadastrar Administrador</button>

    </form>

</div>

<script src="12.CadastroAdmin.js"></script>

</body>
</html>
