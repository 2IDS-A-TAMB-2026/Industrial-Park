<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<title>Cadastro de Administrador</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#1A2742;
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  height:600px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

/* LADO ESQUERDO */
.left{
  width:40%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.left h1{
  font-size:26px;
  margin-bottom:10px;
}

.left p{
  font-size:14px;
  opacity:0.8;
}

/* LADO DIREITO */
.content{
  width:60%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  overflow-y:auto;
}

.content h2{
  color:#0b132b;
  margin-bottom:15px;
}

/* FORM */
.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.campo{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:8px;
}

.form input,
.form select{
  width:80%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input:focus,
.form select:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
  text-align:left;
  min-height:16px;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

/* BOTÃO */
.form button{
  width:80%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#fff;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

.form button:hover{
  transform:scale(1.03);
  background:#1c2541;
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERDA -->
  <div class="left">
    <h1>Área Administrativa</h1>
    <p>Cadastre novos administradores para gerenciar o sistema</p>
  </div>

  <!-- DIREITA -->
  <div class="content">

    <h2>Cadastro de Administrador</h2>

    <form id="formCadastro" class="form">

      <div class="campo">
        <input type="text" id="nome" placeholder="Nome completo">
        <span id="erroNome" class="erro"></span>
      </div>

      <div class="campo">
        <input type="text" id="cpf" placeholder="CPF">
        <span id="erroCpf" class="erro"></span>
      </div>

      <div class="campo">
        <input type="email" id="email" placeholder="E-mail corporativo">
        <span id="erroEmail" class="erro"></span>
      </div>

      <div class="campo">
        <select id="empresa">
          <option value="">Selecione a empresa</option>
          <option value="A">Empresa A</option>
          <option value="B">Empresa B</option>
        </select>
        <span id="erroEmpresa" class="erro"></span>
      </div>

      <div class="campo">
        <input type="password" id="senha" placeholder="Senha">
        <span id="erroSenha" class="erro"></span>
      </div>

      <div class="campo">
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
        <span id="erroConfirmarsenha" class="erro"></span>
      </div>

      <button type="submit">Cadastrar</button>

    </form>

  </div>

</div>

<script src="12.CadastroAdmin.js"></script>

</body>
</html>
