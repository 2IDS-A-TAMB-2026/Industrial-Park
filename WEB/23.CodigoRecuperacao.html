<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código de Verificação</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#1A2742;
}

.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:20px;
}

.left h1{
  font-size:28px;
  opacity:0.9;
}

.content{
  width:50%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
  text-align:center;
}

@keyframes slide{
  from{
    transform:translateX(50px);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.content h2{
  color:#0b132b;
  margin-bottom:20px;
}

.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.inputs-codigo{
  display:flex;
  gap:10px;
  justify-content:center;
}

.inputs-codigo input{
  width:45px;
  height:55px;
  text-align:center;
  font-size:20px;
  border-radius:8px;
  border:2px solid #ccc;
  outline:none;
  transition:0.3s;
}

.inputs-codigo input:focus{
  border-color:#0b132b;
  box-shadow:0 0 5px #0b132b55;
}

.form input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
  text-align:left;
  min-height:18px;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

.form button{
  width:80%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#ffffff;
  cursor:pointer;
}

.links{
  margin-top:15px;
  font-size:13px;
}

.links a{
  color:#0b132b;
  text-decoration:none;
}

.links a:hover{
  text-decoration:underline;
}

@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <img src="images/LogoModoEscuro.png" class="logo">
    <h1>Verifique seu e-mail</h1>
    <p>Digite o código enviado</p>
  </div>

  <div class="content">
    <h2>Código de Verificação</h2>

    <form class="form" id="formCodigo">

  <div class="campo codigo-box">
  <div class="inputs-codigo">
    <input type="text" maxlength="1" class="digito">
    <input type="text" maxlength="1" class="digito">
    <input type="text" maxlength="1" class="digito">
    <input type="text" maxlength="1" class="digito">
    <input type="text" maxlength="1" class="digito">
    <input type="text" maxlength="1" class="digito">
  </div>
  <span id="erroCodigo" class="erro"></span>
</div>

  <button type="submit">Validar Código</button>

      <div class="links">
        <a href="02.LoginUserComum.html">Voltar para Login</a>
      </div>

    </form>
  </div>

</div>

<script src="23.CodigoRecuperacao.js"></script>

</body>
</html>
