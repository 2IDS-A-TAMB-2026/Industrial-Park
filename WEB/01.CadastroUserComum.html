<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<!-- FONTE NOVA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0b132b, #1c2541);
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

/* LADO ESQUERDO */
.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.left h1{
  font-size:18px;
  opacity:0.9;
}

/* LADO DIREITO */
.content{
  width:50%;
  background:#e9ecef; /* 🔥 CINZA CLARO */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
}

@keyframes slide{
  from{
    transform:translateX(50px);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

/* TÍTULO */
.content h2{
  color:#0b132b;
  margin-bottom:20px;
}

/* FORM CENTRALIZADO */
.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center; /* 🔥 centraliza */
}

/* INPUTS PADRONIZADOS */
.form input{
  width:80%; /* 🔥 largura igual pra todos */
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input::placeholder{
  color:#6c757d;
}

.form input:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

/* BOTÃO IGUAL INPUT */
.form button{
  width:80%; /* 🔥 mesmo tamanho */
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#ffffff;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

.form button:hover{
  transform:scale(1.03);
  background:#1c2541;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* ERROS */
.erro{
  font-size:12px;
  color:#d90429;
  width:80%; /* acompanha input */
  text-align:left;
}

/* RODAPÉ */
.footer-text{
  margin-top:15px;
  font-size:12px;
  color:#495057;
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>

</head>
<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="left">
    <h1>Quer mais controle sobre seu estacionamento?</h1>
  </div>

  <!-- LADO DIREITO -->
  <div class="content">
    <h2>Cadastre-se aqui</h2>

    <form class="form" id="formCadastro">
        <input type="text" placeholder="Nome completo" id="NomeCompleto">
        <span id="erroNome" class="erro"></span>

        <input type="email" placeholder="Email" id="Email">
        <span id="erroEmail" class="erro"></span>

        <input type="date" id="DataNasc">
        <span id="erroData" class="erro"></span>

        <input type="text" placeholder="CPF" id="cpf">
        <span id="erroCpf" class="erro"></span>

        <input type="password" placeholder="Senha" id="Senha">
        <span id="erroSenha" class="erro"></span>

        <input type="password" placeholder="Confirmar senha" id="ComfSenha">
        <span id="erroConfirmar" class="erro"></span>

        <button type="submit" id="Cadastro">Cadastrar</button>
    </form>

    <div class="footer-text">Você pode controlar seu estacionamento!</div>
  </div>

</div>

<script src="01.CadastroUserComum.js"></script>

</body>
</html>

</head>
