<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Sensores IoT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  background: linear-gradient(135deg, #0A0F1C, #0F1A35);
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background: rgba(18,28,58,0.9);
  backdrop-filter: blur(12px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo{
  font-size:20px;
  font-weight:600;
  color:#4CC9F0;
  margin-bottom:30px;
}

.menu a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  text-decoration:none;
  color:#B8C2D9;
  transition:0.3s;
}

.menu a:hover{
  background: rgba(76,201,240,0.2);
  color:#fff;
}

.menu a.active{
  background: rgba(76,201,240,0.3);
  color:#fff;
}

.user-footer{
  display:flex;
  align-items:center;
  gap:10px;
  color:#A9B4D0;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* CARD */
.card{
  background: rgba(18,28,58,0.6);
  backdrop-filter: blur(12px);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  color:#A9B4D0;
}

tr{
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-group{
  margin-bottom:10px;
}

input, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#4CC9F0;
  color:#0A0F1C;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* STATUS CORES */
.ativo{ color:#4ade80; }
.inativo{ color:#f87171; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="logo">
      <i class="fa-solid fa-square-parking"></i> Industrial Park
    </div>

    <div class="menu">
      <a href="07.DashboardAdmin.html">
        <i class="fa-solid fa-house"></i> Dashboard
      </a>

      <a href="08.CadastroVagas.html">
        <i class="fa-solid fa-plus"></i> Cadastro de vagas
      </a>

      <a href="09.GerenciamentoSensoresIoT.html" class="active">
        <i class="fa-solid fa-microchip"></i> Sensores IoT
      </a>

      <a href="20.ConfirmaçãoLogout.html">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>
  </div>

  <div class="user-footer">
    <i class="fa-solid fa-circle-user"></i>
    <span>(Admin)</span>
  </div>

</div>

<!-- MAIN -->
<div class="main">
     <!-- FORM -->
  <div class="card">
    <h2>Cadastrar Sensor</h2>

    <form id="formSensor">

      <div class="form-group">
        <label>ID do Sensor</label>
        <input type="text" id="idSensor" placeholder="Ex: SEN-003">
      </div>

      <div class="form-group">
        <label>Vaga Vinculada</label>
        <input type="text" id="vaga" placeholder="Ex: Vaga 01">
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
        </select>
      </div>

      <button type="submit">Salvar Sensor</button>

    </form>
  </div>

  <!-- TABELA -->
  <div class="card">
    <h2>Sensores Cadastrados</h2>

    <table id="tabelaSensores">
      <thead>
        <tr>
          <th>ID</th>
          <th>Vaga</th>
          <th>Status</th>
          <th>Última Comunicação</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>SEN-001</td>
          <td>Vaga 12</td>
          <td class="ativo">Ativo</td>
          <td>24/02/2026 14:32</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const form = document.getElementById("formSensor");
const tabela = document.querySelector("#tabelaSensores tbody");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const id = document.getElementById("idSensor").value;
  const vaga = document.getElementById("vaga").value;
  const status = document.getElementById("status").value;

  const agora = new Date().toLocaleString();

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${id}</td>
    <td>${vaga}</td>
    <td class="${status.toLowerCase()}">${status}</td>
    <td>${agora}</td>
  `;

  tabela.appendChild(tr);

  form.reset();
});
</script>

</body>
</html>
