<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
}

/* LADO ESQUERDO */
.left{
  width:50%;
  background:#027db7;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  text-align:center;
}

/* LOGO */
.logo{
  width:150px;
  margin-bottom:20px;
  border-radius:10px;
}

/* TEXTO */
.left h1{
  font-size:18px;
}

/* LADO DIREITO */
.content{
  width:50%;
  background:#f5f5f5;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
}

@keyframes slide{
  from{
    transform:translateX(50px);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.content h2{
  color:#251494;
  margin-bottom:15px;
}

/* FORM */
.form{
  width:100%;
}

.form input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
  background:#e0e0e0;
}

.form button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#251494;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.form button:hover{
  background:#0d5fbd;
}

/* ERRO */
.erro{
  font-size:12px;
  color:red;
}

/* LINKS */
.links{
  margin-top:15px;
  font-size:13px;
  text-align:center;
}

.links a{
  color:#251494;
  text-decoration:none;
}

.links a:hover{
  text-decoration:underline;
  color: #0d5fbd;
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="left">
    <img src="IndustrialPark.jpg" class="logo">
    <h1>Bem-vindo de volta!<br>Gerencie seu estacionamento com facilidade</h1>
  </div>

  <!-- LADO DIREITO -->
  <div class="content">
    <h2>Faça seu login</h2>

    <form class="form" id="formLogin">

      <input type="email" id="email" placeholder="Email">
      <span id="erroEmail" class="erro"></span>

      <input type="password" id="senha" placeholder="Senha">
      <span id="erroSenha" class="erro"></span>

      <button type="submit">Entrar</button>

      <div class="links">
        <a href="03.RecuperaçãoSenhaEmail.html">Esqueci minha senha</a><br><br>
        <a href="01.CadastroUserComum.html">Ainda não possui uma conta? Criar conta</a>
      </div>

    </form>
  </div>

</div>

<script src="02.LoginUserComum.js"></script>

</body>
</html>
