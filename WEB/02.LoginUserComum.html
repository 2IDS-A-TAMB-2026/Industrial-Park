<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- FONTE IGUAL -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#1A2742;
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

/* LADO ESQUERDO */
.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:20px;
}

.left h1{
  font-size:28px;
  opacity:0.9;
}

/* LADO DIREITO */
.content{
  width:50%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
}

@keyframes slide{
  from{
    transform:translateX(50px);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.content h2{
  color:#0b132b;
  margin-bottom:20px;
}

/* FORM */
.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.campo{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:10px;
}

/* INPUTS */
.form input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input::placeholder{
  color:#6c757d;
}

.form input:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

/* ERRO (corrigido) */
.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
  text-align:left;
  min-height:18px;
  line-height:1.2;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

/* BOTÃO */
.form button{
  width:80%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#ffffff;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

.form button:hover{
  transform:scale(1.03);
  background:#1c2541;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* LINKS */
.links{
  margin-top:15px;
  font-size:13px;
  text-align:center;
}

.links a{
  color:#0b132b;
  text-decoration:none;
}

.links a:hover{
  text-decoration:underline;
}
.cadastro{
  margin-top:10px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background: linear-gradient(135deg, #3fb4d4, #5bc0eb);
  color:#0b132b;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 5px 15px rgba(63,180,212,0.3);
}

.cadastro:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 25px rgba(63,180,212,0.5);
}

.cadastro:active{
  transform:scale(0.97);
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="left">
    <img src="images/LogoModoEscuro.png" class="logo">
    <h1>Bem-vindo de volta!</h1>
    <p>Gerencie seu estacionamento com facilidade!</p>
    <br><br><br><br>
    <h3>Ainda não possui uma conta?</h3>
    <a href="01.CadastroUserComum.html">
      <button class="cadastro">Criar conta</button>
    </a>
  </div>

  <!-- LADO DIREITO -->
  <div class="content">
    <h2>Faça seu login</h2>

    <form class="form" id="formLogin">

      <div class="campo">
        <input type="email" id="email" placeholder="Email">
        <span id="erroEmail" class="erro"></span>
      </div>

      <div class="campo">
        <input type="password" id="senha" placeholder="Senha">
        <span id="erroSenha" class="erro"></span>
      </div>

      <button type="submit">Entrar</button>

      <div class="links">
        <a href="03.RecuperaçãoSenhaEmail.html">Esqueci minha senha</a><br><br>
        
      </div>

    </form>
  </div>

</div>

<script src="02.LoginUserComum.js"></script>

</body>
</html>
