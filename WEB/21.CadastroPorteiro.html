<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Porteiro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color: #1A2742;
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

/* LADO ESQUERDO */
.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.left h1{
  font-size:35px;
}

/* LADO DIREITO */
.content{
  width:50%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.content h2{
  margin-bottom:15px;
  color:#0b132b;
}

.logoCadastro{
  width:90px;
  margin-bottom:15px;
}

/* FORM */
.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.form input, .form select{
  width:80%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#fff;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input:focus, .form select:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

.form button{
  width:80%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#fff;
  cursor:pointer;
}

/* ERROS */
.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
  text-align:left;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
  }
  .left, .content{
    width:100%;
  }
}
</style>

</head>

<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="left">
  <img src="images/LogoModoEscuro.png" class="logoCadastro">
  <h1>Cadastro Porteiro</h1>
  <p>Gerencie acessos do estacionamento com segurança</p>
</div>

  <!-- LADO DIREITO -->
  <div class="content">
    <h2>Cadastre-se aqui!</h2>
    <form class="form" id="formCadastro">

      <input type="text" placeholder="Nome completo" id="nome">
      <span id="erroNome" class="erro"></span>

      <input type="text" placeholder="CPF" id="cpf">
      <span id="erroCpf" class="erro"></span>

      <input type="email" placeholder="E-mail" id="email">
      <span id="erroEmail" class="erro"></span>

      <select id="empresa">
        <option value="">Empresa vinculada</option>
        <option>Empresa A</option>
        <option>Empresa B</option>
      </select>
      <span id="erroEmpresa" class="erro"></span>

      <input type="date" id="dataNascimento">
      <span id="erroData" class="erro"></span>

      <input type="password" placeholder="Senha" id="senha">
      <span id="erroSenha" class="erro"></span>

      <input type="password" placeholder="Confirmar senha" id="confirmarSenha">
      <span id="erroConfirmar" class="erro"></span>

      <button type="submit">Cadastrar</button>

    </form>

  </div>

</div>

<script src="21.CadastroPorteiro.js"></script>

</body>
</html>
