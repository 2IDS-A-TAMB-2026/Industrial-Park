<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrativo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#1A2742;
}

/* CONTAINER */
.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

/* ESQUERDA */
.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:20px;
}

.left h1{
  font-size:28px;
}

.left p{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* DIREITA */
.content{
  width:50%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
}

@keyframes slide{
  from{
    transform:translateX(50px);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.content h2{
  color:#0b132b;
  margin-bottom:20px;
}

/* FORM */
.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.campo{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* INPUT */
.form input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form input::placeholder{
  color:#6c757d;
}

.form input:focus{
  box-shadow:0 0 0 2px #0b132b33;
}

/* ERRO */
.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
  text-align:left;
  min-height:18px;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

/* BOTÃO */
.form button{
  width:80%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#ffffff;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

.form button:hover{
  transform:scale(1.03);
  background:#1c2541;
}

/* RESPONSIVO */
@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERDA -->
  <div class="left">
    <img src="images/LogoModoEscuro.png" class="logo">
    <h1>Área Administrativa</h1>
    <p>Acesse o painel de controle do sistema</p>
  </div>

  <!-- DIREITA -->
  <div class="content">
    <h2>Login Admin</h2>

    <form class="form" id="formLoginAdmin">

      <div class="campo">
        <input type="email" id="email" placeholder="E-mail administrativo">
        <span id="erroEmail" class="erro"></span>
      </div>

      <div class="campo">
        <input type="password" id="senha" placeholder="Senha">
        <span id="erroSenha" class="erro"></span>
      </div>

      <button type="submit">Entrar</button>

    </form>
  </div>

</div>

<script src="06.LoginAdmin.js"></script>

</body>
</html>
