<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrativo</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', system-ui;
}

body,html{
  height:100%;
}

.container{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.background{
  position:absolute;
  inset:0;
  background-image:url('images/estacionamento.jpg'); /* pode trocar */
  background-size:cover;
  background-position:center;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(2,23,54,0.85);
  z-index:1;
}

.content{
  position:relative;
  z-index:2;
  width:350px;
  text-align:center;
}

.content h1{
  font-size:28px;
  margin-bottom:10px;
}

.content h2{
  font-size:32px;
  margin-bottom:20px;
}

.form input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:4px;
}

.form button{
  width:100%;
  padding:12px;
  background:transparent;
  border:2px solid white;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border-radius:4px;
  transition:0.3s;
}

.form button:hover{
  background:white;
  color:#003c96;
}

.erro{
  color:#ff4d4d;
  font-size:12px;
  display:block;
  margin-bottom:8px;
}

</style>
</head>

<body>

<div class="container">

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>Área Administrativa</h1>
    <h2>Login</h2>

    <form class="form" id="formLoginAdmin">

      <input type="email" id="email" placeholder="E-mail administrativo">
      <span id="erroEmail" class="erro"></span>

      <input type="password" id="senha" placeholder="Senha">
      <span id="erroSenha" class="erro"></span>

      <button type="submit">Entrar</button>

    </form>

  </div>

</div>

<script src="06.LoginAdmin.js"></script>

</body>
</html>
