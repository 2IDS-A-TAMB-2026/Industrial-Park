<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Senha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#1A2742;
}

.container{
  width:900px;
  max-width:100%;
  height:550px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  display:flex;
}

.left{
  width:50%;
  background:#0b132b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#eaeaea;
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:20px;
}

.left h1{
  font-size:28px;
}

.content{
  width:50%;
  background:#e9ecef;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
  animation:slide 0.6s ease;
}

.content h2{
  color:#0b132b;
  margin-bottom:20px;
}

.form{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.campo{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:10px;
}

.form input{
  width:80%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffffff;
  color:#0b132b;
  outline:none;
  transition:0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.erro{
  font-size:12px;
  color:#d90429;
  width:80%;
}

.bordaVermelha{
  border:2px solid red !important;
}

.bordaVerde{
  border:2px solid limegreen !important;
}

.form button{
  width:80%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#0b132b;
  color:#ffffff;
  cursor:pointer;
}

.form button:hover{
  transform:scale(1.03);
  background:#1c2541;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

@media (max-width:768px){
  .container{
    flex-direction:column;
    height:auto;
  }

  .left, .content{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <img src="images/LogoModoEscuro.png" class="logo">
    <h1>Nova Senha</h1>
    <p>Crie uma senha segura</p>
  </div>

  <div class="content">
    <h2>Redefinir Senha</h2>

    <form class="form" id="formSenha">

      <div class="campo">
  <input type="password" id="senha" placeholder="Nova senha">
</div>

<div class="campo">
  <input type="password" id="confirmar" placeholder="Confirmar senha">
  <span id="erroSenha" class="erro"></span>
</div>

      <button type="submit">Salvar</button>

    </form>
  </div>

</div>

<script src="24.NovaSenha.js"></script>

</body>
</html>
